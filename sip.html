function calc(){
  let p = +document.getElementById("a").value;
  let r = +document.getElementById("b").value / 12 / 100;
  let n = +document.getElementById("c").value * 12;

  let fv = p * (Math.pow(1+r,n)-1) * (1+r) / r;

  document.getElementById("result").innerText =
    "Future Value: ₹" + fv.toFixed(2);
}
